<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      margin: 0;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover {
      background-color: #0052a3;
    }
    button:active {
      background-color: #003d7a;
    }
    .footer {
      margin-top: 8px;
      text-align: center;
    }
    a {
      color: #0066cc;
      text-decoration: none;
      font-size: 12px;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <button id="open-manager">開啟專案管理</button>
  <div class="footer">
    <a href="#" id="open-settings">設定</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
